name: Daily availability scrape

on:
  schedule:
    # GitHub Actions cron only runs in UTC. Midnight PST (UTC-8) = 08:00 UTC.
    # Note: this is fixed to PST year-round; during PDT (UTC-7) the run lands at
    # 01:00 Pacific. Change to "0 7 * * *" if you'd rather track PDT.
    - cron: "0 8 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions: {}

# Never let two scrape runs (e.g. the nightly cron and a manual run) push at once.
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    permissions:
      contents: read
    uses: ./.github/workflows/scrape-data.yml
    with:
      checkout_repository: ${{ github.repository }}
      checkout_ref: ${{ github.sha }}
      artifact_name: daily-scrape-data
      enable_cache: true

  publish:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Check out (and later push) with a PAT instead of the default
          # GITHUB_TOKEN. Pushes made with GITHUB_TOKEN deliberately do NOT
          # trigger other workflows, so the deploy-on-push-to-main workflow would
          # not run. A PAT's push does trigger it. checkout persists this token as
          # the git credential, so the `git push` step below uses it automatically.
          # Create a fine-grained PAT with Contents: read & write on this repo and
          # store it as an Actions secret named SCRAPE_PAT.
          token: ${{ secrets.SCRAPE_PAT }}
          persist-credentials: true

      - name: Download refreshed data
        uses: actions/download-artifact@v4
        with:
          name: daily-scrape-data
          path: data

      - name: Commit and push data
        env:
          ARCHIVE: ${{ needs.scrape.outputs.archive }}
          SNAPSHOT_DATE: ${{ needs.scrape.outputs.snapshot_date }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/availability.json "$ARCHIVE"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update availability ${SNAPSHOT_DATE}"
            git push
          fi
