name: Deploy site to GitHub Pages

# Builds the Eleventy + Vite static site in `site/` and publishes it to GitHub
# Pages. Runs on pushes to `main` that touch the site or its data (the daily
# scrape commits new `data/` snapshots, which triggers a fresh deploy) and can
# also be run manually from the Actions tab.
#
# One-time setup: enable Pages with "GitHub Actions" as the source
# (repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow a single concurrent Pages deployment; don't cancel one in progress so a
# queued deploy always finishes.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static site
        working-directory: site
        run: npm run build
        env:
          # Served as a project site under https://<user>.github.io/<repo>/.
          BASE_PATH: /Apartment-Scraper/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
