name: Deploy site to GitHub Pages

# Builds the Eleventy + Vite static site in `site/` and publishes it to the root
# of the `gh-pages` branch. The PR preview workflow stores previews on that same
# branch under `pr-preview/`, so this deployment preserves that directory.
# Runs on pushes to `main` (the daily scrape commits new `data/` snapshots,
# which triggers a fresh deploy) and can also be run manually from Actions.
#
# One-time setup: Settings -> Pages -> Build and deployment -> Source:
# "Deploy from a branch", then select `gh-pages` and `/(root)`.

on:
  push:
    branches: [main]
  workflow_dispatch:

# The deployment commits the generated site to the publishing branch.
permissions:
  contents: write

# Production deployments are serialized. Preview deployments use their own
# per-PR groups; both publishing actions use non-force pushes with rebase retries
# so a simultaneous preview update cannot overwrite production (or vice versa).
concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static site
        working-directory: site
        run: |
          npm run build
          touch _site/.nojekyll
        env:
          # Served as a project site under https://<user>.github.io/<repo>/.
          BASE_PATH: /Apartment-Scraper/

      - name: Deploy to GitHub Pages branch
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: site/_site/
          branch: gh-pages
          clean: true
          clean-exclude: pr-preview/
          force: false
          attempt-limit: 10
